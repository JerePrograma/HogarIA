spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hogaria}
    username: ${DB_USER:hogaria}
    password: ${DB_PASSWORD:hogaria}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
server:
  port: 8080
app:
  jwt:
    secret: ${JWT_SECRET:change_me}
    expirationMinutes: 60
