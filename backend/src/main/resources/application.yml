spring:
  profiles:
    default: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hogaria}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
  security:
    allow-x-user-id-fallback: ${ALLOW_X_USER_ID_FALLBACK:true}
  jwt:
    secret: ${JWT_SECRET:change_me}
  integrations:
    cjprestamos:
      enabled: ${CJP_INTEGRATION_ENABLED:false}
      sync-enabled: ${CJP_SYNC_ENABLED:false}
      base-url: ${CJP_BASE_URL:http://localhost:8081}
      api-prefix: ${CJP_API_PREFIX:/api/v1/integration/hogaria}
      username: ${CJP_USERNAME:}
      password: ${CJP_PASSWORD:}
      connect-timeout-ms: ${CJP_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${CJP_READ_TIMEOUT_MS:5000}

---
spring:
  config:
    activate:
      on-profile: local

app:
  security:
    allow-x-user-id-fallback: true

  integrations:
    cjprestamos:
      enabled: ${CJP_INTEGRATION_ENABLED:true}
      sync-enabled: ${CJP_SYNC_ENABLED:true}
      base-url: ${CJP_BASE_URL:http://localhost:8081}
      api-prefix: ${CJP_API_PREFIX:/api/v1/integration/hogaria}
      username: ${CJP_USERNAME:hogaria_tech}
      password: ${CJP_PASSWORD:cambiar-en-entorno}
      connect-timeout-ms: ${CJP_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${CJP_READ_TIMEOUT_MS:5000}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:16:///hogaria
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: validate